# =============================================================================
# The Smoker — Development Nginx Configuration
# Reverse proxy for local dev (no SSL, relaxed rate limits)
#
# In dev mode, API and Web run on the host machine (not in Docker),
# so upstreams point to host.docker.internal.
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # -------------------------------------------------------------------------
    # Logging — custom format with response time
    # -------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time '
                    'rid=$request_id';

    access_log /var/log/nginx/access.log main;

    # -------------------------------------------------------------------------
    # Performance
    # -------------------------------------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # -------------------------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/html
        text/css
        application/javascript
        application/json
        image/svg+xml
        text/plain
        text/xml
        application/xml;

    # -------------------------------------------------------------------------
    # Rate limiting — relaxed for development (50 req/s)
    # -------------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/s;

    # -------------------------------------------------------------------------
    # Upstreams — host machine (not Docker containers)
    # -------------------------------------------------------------------------
    upstream api_backend {
        server host.docker.internal:4000;
    }

    upstream web_backend {
        server host.docker.internal:3000;
    }

    # -------------------------------------------------------------------------
    # HTTP server (no SSL in development)
    # -------------------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # — Request body size limit (file uploads) —————————————————————————
        client_max_body_size 100m;

        # -----------------------------------------------------------------
        # API routes — /api/*
        # -----------------------------------------------------------------
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # -----------------------------------------------------------------
        # Health check endpoint
        # -----------------------------------------------------------------
        location /health {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        # -----------------------------------------------------------------
        # Socket.io — WebSocket + polling
        # -----------------------------------------------------------------
        location /socket.io/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_buffering off;
            proxy_cache off;

            # Keep WebSocket connections alive for 1 hour
            proxy_connect_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;
        }

        # -----------------------------------------------------------------
        # Next.js HMR WebSocket — /_next/webpack-hmr
        # -----------------------------------------------------------------
        location /_next/webpack-hmr {
            proxy_pass http://web_backend;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_cache off;
        }

        # -----------------------------------------------------------------
        # Web app — catch-all (must be last)
        # -----------------------------------------------------------------
        location / {
            proxy_pass http://web_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Support Next.js HMR WebSocket
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
