name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run database migrations
        run: |
          docker pull ghcr.io/${{ github.repository }}/api:${{ github.event.workflow_run.head_sha }}
          docker run --rm \
            -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
            ghcr.io/${{ github.repository }}/api:${{ github.event.workflow_run.head_sha }} \
            npm run db:migrate

      - name: Deploy API
        run: |
          echo "IMAGE_TAG=${{ github.event.workflow_run.head_sha }}" >> .env
          docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d api

      - name: Deploy Web
        run: |
          docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d web

      - name: Health check
        run: |
          for i in $(seq 1 30); do
            if curl -sf ${{ vars.API_URL }}/health > /dev/null 2>&1; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i/30 failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 30 attempts"
          exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Rolling back to previous deployment..."
          docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d --force-recreate api web

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run database migrations
        run: |
          docker pull ghcr.io/${{ github.repository }}/api:${{ github.event.workflow_run.head_sha }}
          docker run --rm \
            -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
            ghcr.io/${{ github.repository }}/api:${{ github.event.workflow_run.head_sha }} \
            npm run db:migrate

      - name: Deploy API
        run: |
          echo "IMAGE_TAG=${{ github.event.workflow_run.head_sha }}" >> .env
          docker compose -f docker-compose.yml -f docker-compose.production.yml up -d api

      - name: Deploy Web
        run: |
          docker compose -f docker-compose.yml -f docker-compose.production.yml up -d web

      - name: Health check
        run: |
          for i in $(seq 1 30); do
            if curl -sf ${{ vars.API_URL }}/health > /dev/null 2>&1; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i/30 failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 30 attempts"
          exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Rolling back to previous deployment..."
          docker compose -f docker-compose.yml -f docker-compose.production.yml up -d --force-recreate api web

      - name: Notify team
        if: success()
        run: |
          curl -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"text":"🚀 The Smoker deployed to production: ${{ github.event.workflow_run.head_sha }}"}'
