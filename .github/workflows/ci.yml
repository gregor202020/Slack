name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx turbo run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: smoker
          POSTGRES_PASSWORD: smoker_dev
          POSTGRES_DB: smoker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://smoker:smoker_dev@localhost:5432/smoker_test
      TEST_DATABASE_URL: postgresql://smoker:smoker_dev@localhost:5432/smoker_test
      REDIS_URL: redis://localhost:6379/1
      JWT_SECRET: test-jwt-secret-ci
      TWILIO_ACCOUNT_SID: test_sid
      TWILIO_AUTH_TOKEN: test_token
      TWILIO_FROM_NUMBER: '+15555555555'
      S3_BUCKET: test-bucket
      S3_REGION: us-east-1
      S3_ENDPOINT: https://test.digitaloceanspaces.com
      S3_ACCESS_KEY: test-access-key
      S3_SECRET_KEY: test-secret-key
      S3_FILE_DOMAIN: https://test-files.example.com
      PII_ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      INVITE_HMAC_SECRET: test-invite-hmac-secret-for-ci-pipeline
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high --production
        continue-on-error: true

      - name: Run database migrations
        run: npm run db:migrate

      - name: Run API tests
        run: npm run test:api

      - name: Run mobile tests
        run: npm run test:mobile
        continue-on-error: true

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: apps/api/coverage/
          retention-days: 7

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [test, build]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: smoker
          POSTGRES_PASSWORD: smoker_dev
          POSTGRES_DB: smoker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://smoker:smoker_dev@localhost:5432/smoker_test
      REDIS_URL: redis://localhost:6379/1
      JWT_SECRET: test-jwt-secret-ci
      TWILIO_ACCOUNT_SID: test_sid
      TWILIO_AUTH_TOKEN: test_token
      TWILIO_FROM_NUMBER: '+15555555555'
      S3_BUCKET: test-bucket
      S3_REGION: us-east-1
      S3_ENDPOINT: https://test.digitaloceanspaces.com
      S3_ACCESS_KEY: test-access-key
      S3_SECRET_KEY: test-secret-key
      S3_FILE_DOMAIN: https://test-files.example.com
      PII_ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      INVITE_HMAC_SECRET: test-invite-hmac-secret-for-ci-pipeline
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run database migrations
        run: npm run db:migrate

      - name: Seed test database
        run: npm run db:seed

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            apps/api/dist/
            apps/web/.next/
          retention-days: 1

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: api
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}
            ${{ github.ref == 'refs/heads/main' && format('ghcr.io/{0}/api:latest', github.repository) || format('ghcr.io/{0}/api:develop', github.repository) }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: web
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository }}/web:${{ github.sha }}
            ${{ github.ref == 'refs/heads/main' && format('ghcr.io/{0}/web:latest', github.repository) || format('ghcr.io/{0}/web:develop', github.repository) }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
