# Test compose — isolated infrastructure for running tests.
#
# Ports are offset from dev to avoid conflicts:
#   Postgres: 5433  (dev 5432)
#   Redis:    6380  (dev 6379)
#   MinIO:    9002  (dev 9000)
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d --wait
#   make test-infra          (equivalent)
#   bash scripts/test-setup.sh   (also runs migrations)

services:
  postgres:
    image: postgres:16-alpine
    container_name: smoker-test-postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: smoker
      POSTGRES_PASSWORD: smoker_dev
      POSTGRES_DB: smoker_test
    volumes:
      - test_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U smoker']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smoker-test-redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: smoker-test-minio
    restart: unless-stopped
    ports:
      - '9002:9000'
      - '9003:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  test_postgres_data:
